name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build worker bundle
        # esbuild bundles src/index.ts into a single ESM file
        run: npm run build

      - name: Create GitHub Release and upload worker.js
        uses: softprops/action-gh-release@v2
        with:
          files: dist/worker.js
          generate_release_notes: true
