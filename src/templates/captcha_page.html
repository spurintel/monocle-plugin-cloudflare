<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checking Connection...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            font-family: "Inter";
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            color: black;
            transition: background-color 0.3s, color 0.3s;
        }

        a {
            color: black;
            transition: color 0.3s;
            text-decoration: none;
        }

        .spur-logo {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .center-div {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .center-div > a:first-child {
            margin-bottom: 9px;
        }

        @media (prefers-color-scheme: dark) {

            body,
            html {
                background-color: black;
                color: white;
            }

            a {
                color: white;
            }

            .terms {
                color: white;
            }

        }

        @keyframes dots {

            0%,
            25% {
                content: "";
            }

            50% {
                content: ".";
            }

            75% {
                content: "..";
            }

            100% {
                content: "...";
            }
        }

        .loading {
            font-weight: normal;
            width: 300px;
            text-align: left !important;
            margin: 0;
            font-size: 1.3rem;
            padding-left: 10px;
            margin-left: 40px;
            box-sizing: border-box;
        }

        .loading-no-animation {
            text-align: left;
            width: 200px;
        }

        .terms {
            font-size: 0.8rem;
            color: #888;

            a {
                color: #888;
                text-decoration: underline;
            }
        }

        .loading::after {
            content: "";
            animation: dots 4s infinite;
        }
    </style>
</head>

    <script>
        const updateTheme = () => {
            if (
                window.matchMedia &&
                window.matchMedia("(prefers-color-scheme: dark)").matches
            ) {
                document.body.style.backgroundColor = "black";
                document.body.style.color = "white";
            } else {
                document.body.style.backgroundColor = "white";
                document.body.style.color = "black";
            }
        };
        updateTheme();
        window
            .matchMedia("(prefers-color-scheme: dark)")
            .addEventListener("change", (e) => {
                updateTheme();
            });
    </script>
    <script src="https://mcl.spur.us/d/mcl.js?tk=PUBLISHABLE_KEY">

    <script>
        // Function to handle the captcha data submission
       // Function to handle the captcha data submission
// Function to handle captcha data submission
function submitCaptchaData(data) {
  fetch('/validate_captcha', {
    method: 'POST',
    redirect: 'manual',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ captchaData: data }),
  })
    .then(response => {
      if (response.ok) {
        window.location.href = 'REPLACE_REDIRECT'; // On success, redirect as before.
        return;
      }

      // Check for a configured block action from the worker.
      const blockAction = response.headers.get('X-Block-Action');

      if (blockAction && blockAction.startsWith('redirect:')) {
        // Redirect type — navigate to the configured URL.
        window.location.href = blockAction.slice('redirect:'.length);
        return;
      }

      if (blockAction === 'html') {
        // HTML block page — replace the entire document with the configured page.
        response.text().then((html) => {
          document.open();
          document.write(html);
          document.close();
        });
        return;
      }

      // Deliberate block (403) — show denial message using response body.
      if (response.status === 403) {
        connectionStatus.className = 'loading-no-animation';
        document.title = "Monocle CAPTCHA Denied";
        response.text().then((message) => {
          const basicText = message && message.trim() !== "" ? message : "any VPNs or proxies and try again";
          document.getElementById('connectionStatus').textContent = `Captcha validation failed. ${basicText}.`;
          updateTheme();
        });
        return;
      }

      // Any other error — fail open and allow traffic through.
      window.location.href = 'REPLACE_REDIRECT';
    })
    .catch(error => {
      console.error('Error during captcha validation:', error);
      alert('An error occurred. Please try again.');
    });
}


        // Initialize or reset the submission flag when appropriate
        // window.bundleSubmitted = false;

        if (window.MCL) {
            MCL.configure({
                onBundle: function (b) {
                    submitCaptchaData(b);
                }
            })
        } else {
            console.error('MCL script not loaded');
            alert('Captcha loading failed. Please refresh the page.');
        }
    </script>
